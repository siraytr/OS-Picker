<!DOCTYPE html>
<html lang="de">
 <head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS-Picker</title>
</head>




<body>

  <header>
  <nav>
    <a href="index.html">Startseite</a>
    <h1>OS-Picker</h1>
    <a href="Vergleich/Vergleich.html">Vergleich</a>
  </nav>
</header>

  <main>
   <section class="Hauptinfo">
    <h1>Dein Guide durch den Betriebssystem-Dschungel.</h1>
     <a href="#ziel"><button class="btt2" alt="Scroll Down">↓</button></a>
   </section>
    <p id="ziel">Finde Heraus welches Betriebssystem am besten zu dir passt.<br>
    </p>
    <div class="arrow">
      <p>↓</p>
      </div>
      <div class="os-logos">
         <a href="Infos/windows.html">
        <img src="Logos/Windows.webp" alt="Windows Logo" width=100px>
          </a>
          <a href="Infos/linux.html">
        <img src="Logos/Linux.png" alt="Linux Logo" width=100px>
          </a>
          <a href="Infos/macos.html">
        <img src="Logos/MacOS.png" alt="MacOS Logo" width=100px>
          </a>
    </div>
    <div class="form-container">
      <b class="box-title">Umfrage</b>
      <form>
        <input type="text" placeholder="Dein Name">
        <label for="OS">Wähle ein Betriebssystem:</label>
        <select id="OS" name="OS">
          <option value="windows">Windows</option>
          <option value="linux">Linux</option>
          <option value="macos">MacOS</option>
        </select>
        <button class="btt1" type="submit">Absenden</button>
      </form>
    </div>
  </main>

  <footer>
   <b>© 2026 OS-Picker</b>
   <a href="Impressum/impressum.html">Impressum</a>
   <a href="Datenschutz/datenschutz.html">Datenschutz</a>
  </footer>

</body>
